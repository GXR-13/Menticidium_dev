guanghai: "广海"
guanghai_prefix: "广海"
guanghai_collective_noun: "广海"
guanghai_desc: "#size:15 在世界的这一端，遥远东方流于少量商人与冒险者口中的传说。据说世界彼端的人们分裂成无数战国，互相残杀；据说那片土地上的人们不畏神明，只对早已死去的圣君大加崇拜；据说他们虽然不能建立文明开化的帝国，却能开发出无人能够理解的机巧工具......这些都不过是传言。东方实际是什么面貌？这问题恐怕只有一位实际在东方生活过的人才能解答——甚至即便如此，他也难以讲述一个完整的东方。"

