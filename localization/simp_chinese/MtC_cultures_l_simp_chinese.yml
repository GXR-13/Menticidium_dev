#近卢齐组
noszian: "诺斯济亚"
noszian_prefix: "诺斯济亚"
noszian_collective_noun: "诺斯济亚"
noszian_desc: "#size:15 诺斯济亚人定居在大希莫瓦尔德森林东北部以及波莫罗湖周围。他们至今仍然相当部落化，并主要生活在其他封建卢齐人政权的统治之下。他们亲近自然，掌握高超的狩猎与野外生存技艺。许多外人将其视作未开化的野人，但他们实际上也拥有丰富的文学与艺术传统。有些理论认为他们文化的形式在目前的东境诸民族中可能最接近古代卢齐人原始的形态。"

ptaskan: "普塔斯卡"
ptaskan_prefix: "普塔斯卡"
ptaskan_collective_noun: "普塔斯卡"
ptaskan_desc: "#size:15 普塔斯卡人是东境卢齐人中最具强盛的一支。他们定居在该地区最富饶的河谷地带，在此创造了繁盛的文明。与其他东境本地文化相比，他们的科技与文艺都更为先进，经济也更为发达。他们常常自诩“文明”，并将自身视作是东境卢齐人的代表。尽管大部分普塔斯卡人不愿承认，但他们也是东境人中受希里亚影响较深的一支：许多源自帝国的概念，例如其法律理念或是宗教观，都已在普塔斯卡文化中深深扎根。"

iowician: "约维茨"
iowician_prefix: "约维茨"
iowician_collective_noun: "约维茨"
iowician_desc: "#size:15 约维茨人源自古卢齐人迁往白河上游方向的一支。上游地区未被开拓的土地产生了极大的生存压力，这使得许多约维茨人转而靠劫掠而生。在百年前的战乱时期，约维茨劫掠者沿河而下，对东境，乃至帝国边疆都产生过威胁。时至今日，随着地缘政治局势的变化，劫掠者不再像以前那么猖獗，许多人选择更安稳的农牧生活，而另一些人则将自己的武艺应用在更“正规”的工作上：约维茨人是东境知名的佣兵和保镖，他们名声远扬，乃至帝国境内都不乏其雇主。"

bokojowish: "博科约瓦"
bokojowish_prefix: "博科约瓦"
bokojowish_collective_noun: "博科约瓦"
bokojowish_desc: "#size:15 博科约瓦人在日巴斯卡河谷打造了了繁荣昌盛的王国。他们的祖先由于某些原因脱离白河沿岸的卢齐人大部，并设法在环境严酷的群山之间生存了下来。博科约瓦文化孕育了远近闻名的工匠，借助着本地的资源优势，他们能生产出最优质的武器，铠甲，工具或是饰品。由于地理上的阻隔以及他们文化内生的孤立主义倾向，博科约瓦人自古以来很少与外界有除了有限贸易以外的往来。这使得该文化在外人眼中笼罩着一层神秘色彩，而许多细节尚不为人所知：其中就包括他们在群山之中的生存之道。"

#其他
varaparian: "瓦拉帕里亚"
varaparian_prefix: "瓦拉帕里亚"
varaparian_collective_noun: "瓦拉帕里亚"
varaparian_desc: "#size:15 瓦拉帕里亚人生活在荒凉的达维西亚地区，并将其视作自己的故地。他们的村社有着相当的平等主义色彩，并维系着一种在外人看来匪夷所思的集体制度。除此之外，他们还以极端的和平主义为特征：许多瓦拉帕里亚人从未见过兵器，士兵与战士往往在其社会中遭到排斥。在本地信仰的影响下，他们能形成具有相当凝聚力的部落——但若非是因为达维西亚贫瘠的土地历来鲜少受到周围政权的重视，他们恐怕难逃被征服的命运。"

