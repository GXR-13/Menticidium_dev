l_simp_chinese:

#希里亚组
high_hirian: "高希里亚"
high_hirian_prefix: "高希里亚"
high_hirian_collective_noun: "高希里亚"
high_hirian_desc: "#size:15 高希里亚文化诞生于帝国政治中心优渥的生活之中。尽管帝都居民往往仅将他们的生活视作一种优越待遇，在许多周围省份的人民看来，这已经为他们赋予了一种不同的身份。高希里亚人对富足的生活习以为常，其繁荣的饮食与娱乐文化汇集了全帝国各处的影响，并且相当一部分高希里亚人都经受过良好教育，或是出身于拥有一定地位的家庭。尽管如此，由于定居政策的影响以及各省经济之间的差异，他们往往被外人视作傲慢的排外者，或是忽视帝国外省血汗的无情剥削者；除此之外，他们还因为在帝政中心沾染的官僚习气而闻名——这进一步加剧了他们与所谓“外省人”之间的隔阂。"

north_hirian: "北希里亚"
north_hirian_prefix: "北希里亚"
north_hirian_collective_noun: "北希里亚"

south_hirian: "南希里亚"
south_hirian_prefix: "南希里亚"
south_hirian_collective_noun: "南希里亚"

green_hirian: "绿希里亚"
green_hirian_prefix: "绿希里亚"
green_hirian_collective_noun: "绿希里亚"

concordian: "康科迪亚"
concordian_prefix: "康科迪亚"
concordian_collective_noun: "康科迪亚"
concordian_desc: "#size:15 康科迪亚人与联盟民构成了老联盟的两面：前者被视作康科迪亚的本地居民，也是该地古老秩序的主要掌权人。康科迪亚人鲜少外出为官，但他们借助世袭的复杂系统牢牢把持着老联盟的政治。他们的文化中保留了许多旧时代的残余，尤其以其血统论倾向闻名。有些时候，康科迪亚人也被称作“旧希里亚人”，暗示了他们在帝国历史上或许还有未被揭示的地位。"

leaguemen: "联盟民"
leaguemen_prefix: "联盟民"
leaguemen_collective_noun: "联盟民"
leaguemen_desc: "#size:15 康科迪亚人与联盟民构成了老联盟的两面：后者与其说是一种文化，不如说是对老联盟中大量流动人口的统称。来自帝国各地，文化背景不同的人民在老联盟的独特体制中得到了融合，并往往以“联盟民”自居；在离开老联盟，成功入仕之后，他们中的大部分人都会弃用这个名号，恢复自己的文化身份，但也有少数人保持了这一认可，并将老联盟视作自己的第二故乡。在帝国之中，不乏有人认为联盟民这种消除地域隔阂，人人之间彼此平等的“文化”代表了帝国，乃至共融信仰的理想形态。"

#北方组
manian: "曼尼亚"
manian_prefix: "曼尼亚"
manian_collective_noun: "曼尼亚"
manian_desc: "如今被称作北希里亚的各民族曾经以其他的名号自居：曼尼亚人。他们的起源众说纷纭，有人认为他们是北方土地自古以来的定居者，也有人声称他们是自极北山外废土迁徙而来的部族后裔。不论如何，作为一种独立认同的曼尼亚民族早已不再，他们的后裔大多以希里亚人自居。"

zurunnish: "祖尔伦"
zurunnish_prefix: "祖尔伦"
zurunnish_collective_noun: "祖尔伦"
zurunnish_desc_desc: "#size:15 祖尔伦人是北希里亚各部中最古老的一支——他们现在所主要分布于大希莫瓦尔德森林周围，此处据说便是北希里亚地区文明的发源地。得益于地理环境的庇护，他们的文化保留了许多希里亚，乃至旧帝国之前的习俗。哪怕在北方人中，祖尔伦人也以其豪放与直爽而闻名；但与此同时，这种旧风俗的保留也使得他们被许多自诩更加开化的帝国人视作是一种野蛮习气。"

gronlander: "格隆兰"
gronlander_prefix: "格隆兰"
gronlander_collective_noun: "格隆兰"
gronlander_desc: "#size:15 格隆兰人的名称意为“绿原人”，他们定居在帝国北方最富饶的土地上，相比于其他北方同胞更适应传统的农耕生活，其社会也倾向于稳定与保守。格隆兰人朴素并富有生活智慧，将伊彭兰地区建设成为了帝国的主要支柱之一；他们给人的印象温和且不好战，背井离乡前去参军或是成为冒险者之人鲜少，但近年来在兴起的城市化与北方爆发蓝色瘟疫的共同影响下，他们传统的社会框架也遭到了冲击。"

weisslander: "维斯兰"
weisslander_prefix: "维斯兰"
weisslander_collective_noun: "维斯兰"
weisslander: "#size:15 维斯兰人世代定居在北希里亚中部多丘陵的地区。这里险要的地势磨练了他们的心性：维斯兰人坚定，固执且不畏艰险。他们习惯于简朴的生活，在维斯胡格的岩石山丘中开辟出了许多定居点，并以其精妙的建筑技艺而闻名。据说在历史上，他们的祖先曾第一批起兵与加入希里亚的行伍，共同对抗旧帝国的暴政——在帝国旧勋贵家族中不乏维斯兰人，也是这一传说的有力佐证。"

fretian: "弗雷蒂亚"
fretian_prefix: "弗雷蒂亚"
fretian_collective_noun: "弗雷蒂亚"

zuidlander: "随兰"
zuidlander_prefix: "随兰"
zuidlander_collective_noun: "随兰"

albennian: "亚贲"
albennian_prefix: "亚贲"
albennian_collective_noun: "亚贲"
albennian_desc: "#size:15 据说亚贲人的祖先在古代北希里亚各部中遭到排挤，一路流浪到当初的边陲之地，在白河岸边定居了下来。且不论这传说的真假，亚贲人的开拓精神确实一贯传承至今。他们主导了对东境的移民还和对因特马克的拓殖，并维持着独特的“武装村落”民兵传统。亚贲人尚武且崇尚纪律，这也使得他们成为了帝国军队关键的兵源。虽然如此，他们重刀兵而轻文艺的习俗也在帝国内外招致了不少非议。"

ostlander: "奥斯特兰"
ostlander_prefix: "奥斯特兰"
ostlander_collective_noun: "奥斯特兰"
ostlander_desc: "#size:15 东境的领土在帝国中兴期的末尾被纳入帝国统治。对这里的征服导致了大量白河西岸北希里亚移民的涌入，这些定居者随后脱离帝国统治，甚至一度建立起了覆盖全东境的霸权，并在此期间中逐渐与当地人融合。他们的文化很大程度上与其故土的亚贲人相似，但在与东境人的交融中失去了曾经的侵略性和尚武精神。他们生活在尴尬的文化困境中：东境本地的卢齐人视他们为侵略者的后裔与曾经的压迫者，尤其是在帝国近来征讨东方未果后，更是对其憎恨有加；而帝国一侧，曾经的政治分离也让希里亚人对他们兴趣索然，并不视他们为同胞。"

#南方组
old_banlian: "古班利亚"
old_banlian_prefix: "古班利亚"
old_banlian_collective_noun: "古班利亚"
old_banlian_desc: "现如今的帝国南方各民族曾有许多不同的名号。古老王国的遗民称其为亚坎人，所剩无几的旧帝国史料有时将他们统称为南蛮，而现如今的帝国史学界普遍将他们称作古班利亚人。不论称呼如何，这似乎都在暗示现如今将自己视为南希里亚人的各民族在曾经有着更紧密的亲缘关系——乃至曾生活在同一面形势下。"

banlian: "班利亚"
banlian_prefix: "班利亚"
banlian_collective_noun: "班利亚"
banlian_desc: "#size:15 主要分布于留西亚地区的班利亚人存在极为特殊；他们与其他南方文化出自同源，却在岁月中发生了许多变化：在受到中央的希里亚人影响的同时，许多南方传统在其文化中的影响仍然根深蒂固。他们保留了南方文化以家族为中心的价值观，又与来自希里亚统治中制度化的“誓言”理念相融合，最终形成了远近闻名的“骑士精神”。在传统豪族基础上构建的骑士阶层是班利亚社会的支柱，并在该地区与帝国官僚政治形成了微妙的结合。"

platian: "普拉提亚"
platian_prefix: "普拉提亚"
platian_collective_noun: "普拉提亚"
