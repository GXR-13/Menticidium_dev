gollois: "夏瓦利耶"
gollois_prefix: "夏瓦利耶"
gollois_collective_noun: "夏瓦利耶"
gollois_desc: "#size:15 与许多人印象中不同，南希里亚人并非全都安于在自己的故土上居住，而不愿向外开拓。从3世纪开始，陆续有来自留西亚和普拉提亚两省的移民前往富饶的夏瓦勒斯河谷定居；这些移民与当地的高勒汶居民逐渐融合，形成了如今的夏瓦利耶人。他们以高超的骑术闻名，也吸收了一部分高勒汶人的习俗与传统。"

suditish: "苏蒂特"
suditish_prefix: "苏蒂特"
suditish_collective_noun: "苏蒂特"
suditish_desc: "#size:15 苏蒂特人是广泛分布于南省与德约瓦两个省份的南方民族，也是农耕社会边境顽强生存的群体。他们在旧帝国时期与希里亚统治中期遭受过许多灾难与战乱的冲击，而这略显悲惨的命运也塑造了他们独特的民族文化。苏蒂特人往往寡言少语，但他们会通过行动表达顺服与忠诚。他们可以成为完美的下属，劳力与士兵，但与此同时，这种沉默的顺从也偶尔会被外人视作笨拙，乃至愚钝。"

