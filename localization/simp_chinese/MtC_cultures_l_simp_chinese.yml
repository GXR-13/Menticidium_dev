l_simp_chinese:

#希里亚组
high_hirian: "高希里亚"
high_hirian_prefix: "高希里亚"
high_hirian_collective_noun: "高希里亚"
high_hirian_desc: "#size:15 高希里亚文化诞生于帝国政治中心优渥的生活之中。尽管帝都居民仅将他们的生活视作一种优越待遇，在许多周围省份的人民看来，这已经为他们赋予了一种不同的身份。高希里亚人对富足的生活习以为常，其奢侈的饮食与娱乐文化汇集了全帝国各处的影响，并且相当一部分高希里亚人都经受过良好教育，或是出身于拥有一定地位的家庭。尽管如此，由于定居政策的影响以及各省经济之间的差异，他们往往被外人视作傲慢的排外者，或是忽视帝国外省血汗的无情剥削者；除此之外，他们还因为在帝政中心沾染的官僚习气而闻名——这进一步加剧了他们与所谓“外省人”之间的隔阂。"

north_hirian: "北希里亚"
north_hirian_prefix: "北希里亚"
north_hirian_collective_noun: "北希里亚"
north_hirian_desc: "#size:15 尽管经常被用以指代生活在帝国北方形色各异的民族，但狭义上的北希里亚人更多指完全接受了帝国生活方式及语言的特定一部分北方人。他们主要集中分布在北方近年来新兴的几座大型城市中，与此同时，出身北方的许多高官或勋贵也由于帝国官场中的影响而变得更加“希里亚化”。北希里亚人与他们的大部分表亲一样，粗放而豪爽，但他们早已抛弃了传统的地域认同，转而拥抱更广泛的希里亚身份。"

south_hirian: "南希里亚"
south_hirian_prefix: "南希里亚"
south_hirian_collective_noun: "南希里亚"
south_hirian_desc: "#size:15 尽管经常被用以指代生活在帝国南方形色各异的民族，但狭义上的南希里亚人更多指完全接受了帝国生活方式及语言的特定一部分南方人。除了出身南方的许多高官和希里亚化的南方旧贵族，他们也大量分散在南方的富裕乡村中。南希里亚人继承了许多来自其他南方文化的个性，温和而精明，但他们早已抛弃了传统的地域认同，转而拥抱更广泛的希里亚身份。"

green_hirian: "绿希里亚"
green_hirian_prefix: "绿希里亚"
green_hirian_collective_noun: "绿希里亚"
green_hirian_desc: "#size:15 除了希里亚人，白河与绿河之间的地区也曾有过许多其他住民。根据帝国方面的记载，他们很可能在反抗奥西迪亚时就与希里亚人并肩作战，并与部分北方部族一同构成了希里亚帝国的雏形。时至今日，他们中的大部分都已被整合进了帝国社会，享受与其他帝国公民相同的待遇；但在许多场合，他们仍被非正式地称呼为“绿希里亚人”。这种称呼既代表着一种隐性的隔阂，也体现了他们并未完全脱离自身的文化根源。"

concordian: "康科迪亚"
concordian_prefix: "康科迪亚"
concordian_collective_noun: "康科迪亚"
concordian_desc: "#size:15 康科迪亚人与联盟民构成了老联盟的两面：前者被视作康科迪亚的本地居民，也是该地古老秩序的主要掌权人。康科迪亚人鲜少外出为官，但他们借助世袭的复杂系统牢牢把持着老联盟的政治。他们的文化中保留了许多旧时代的残余，尤其以其血统论倾向闻名。有些时候，康科迪亚人也被称作“旧希里亚人”，暗示了他们在帝国历史上或许还有未被揭示的地位。"

leaguemen: "联盟民"
leaguemen_prefix: "联盟民"
leaguemen_collective_noun: "联盟民"
leaguemen_desc: "#size:15 康科迪亚人与联盟民构成了老联盟的两面：后者与其说是一种文化，不如说是对老联盟中大量流动人口的统称。来自帝国各地，文化背景不同的人民在老联盟的独特体制中得到了融合，并往往以“联盟民”自居；在离开老联盟，成功入仕之后，他们中的大部分人都会弃用这个名号，恢复自己的文化身份，但也有少数人保持了这一认可，并将老联盟视作自己的第二故乡。在帝国之中，不乏有人认为联盟民这种消除地域隔阂，人人之间彼此平等的“文化”代表了帝国，乃至共融信仰的理想形态。"

#北方组
manian: "曼尼亚"
manian_prefix: "曼尼亚"
manian_collective_noun: "曼尼亚"
manian_desc: "#size:15 如今被称作北希里亚的各民族曾经以其他的名号自居：曼尼亚人。他们的起源众说纷纭，有人认为他们是北方土地自古以来的定居者，也有人声称他们是自极北山外荒土迁徙而来的部族后裔。不论如何，作为一种独立认同的曼尼亚民族早已不再，他们的后裔大多以希里亚人自居。"

zurunnish: "祖尔伦"
zurunnish_prefix: "祖尔伦"
zurunnish_collective_noun: "祖尔伦"
zurunnish_desc_desc: "#size:15 祖尔伦人是北希里亚各部中最古老的一支——他们现在所主要分布于大希莫瓦尔德森林周围，此处据说便是北希里亚地区文明的发源地。得益于地理环境的庇护，他们的文化保留了许多希里亚，乃至旧帝国之前的习俗。哪怕在北方人中，祖尔伦人也以其豪放与直爽而闻名；但与此同时，这种旧风俗的保留也使得他们被许多自诩更加开化的帝国人视作是一种野蛮习气。"

gronlander: "格隆兰"
gronlander_prefix: "格隆兰"
gronlander_collective_noun: "格隆兰"
gronlander_desc: "#size:15 格隆兰人的名称意为“绿原人”，他们定居在帝国北方最富饶的土地上，相比于其他北方同胞更适应传统的农耕生活，其社会也倾向于稳定与保守。格隆兰人朴素并富有生活智慧，将伊彭兰地区建设成为了帝国的主要支柱之一；他们在外人的印象中温和且不好战，少有人背井离乡前去参军或是成为冒险者，但近年来在兴起的城市化与北方爆发蓝色瘟疫的共同影响下，他们传统的社会框架也遭到了冲击。"

weisslander: "维斯兰"
weisslander_prefix: "维斯兰"
weisslander_collective_noun: "维斯兰"
weisslander_desc: "#size:15 维斯兰人世代定居在北希里亚中部多丘陵的地区。这里险要的地势磨练了他们的心性：维斯兰人坚定，固执且不畏艰险。他们习惯于简朴的生活，在维斯胡格的岩石山丘中开辟出了许多定居点，并以其精妙的建筑技艺而闻名。据说在历史上，他们的祖先曾第一批起兵与加入希里亚的行伍，共同对抗旧帝国的暴政——在帝国勋贵家族中不乏维斯兰人，也是这一传说的有力佐证。"

fretian: "维辛"
fretian_prefix: "维辛"
fretian_collective_noun: "维辛"
zuidlander_desc: "#size:15 伊普河将奥滕兰分割成两部分，其北半部多沼泽，自然条件更为恶劣，维辛人居住在这一地区。他们常常被与其南方表亲相比较：比起随兰人，他们更加务实与简朴，行事风格更为冷静；他们没那么专注于农业，而是擅长航海与通商——这在帝国境内实属罕见。同样值得注意的是，他们的社会展现出了极强的包容性，其习俗也表现出了许多其他文化影响的迹象，这令其具体起源成了帝国学界中的争议话题。"

zuidlander: "随兰"
zuidlander_prefix: "随兰"
zuidlander_collective_noun: "随兰"
zuidlander_desc: "#size:15 生活在奥滕兰南半部富饶平原上的北希里亚人演进为了如今的随兰人。他们大多操着独特的西部口音，并维持着一套繁杂的宫廷与民间礼节体系，这在其他北方文化中都很少见。他们的语言，审美和习俗都与其他北希里亚人有很大的不同——这成为了许多学者至今仍在深入研究的课题。有理论认为这种差异源自奥西迪亚统治的深度影响，也有人认为这代表着隋兰人在古代更早时候或许与其他北方民族就发生了分离。"

albennian: "亚贲"
albennian_prefix: "亚贲"
albennian_collective_noun: "亚贲"
albennian_desc: "#size:15 据说亚贲人的祖先在古代北希里亚各部中遭到排挤，一路流浪到当初的边陲之地，在白河岸边定居了下来。且不论这传说的真假，亚贲人的开拓精神确实一贯传承至今。他们主导了对东境的移民还和对因特马克的拓殖，并维持着独特的“武装村落”民兵传统。亚贲人尚武且崇尚纪律，这也使得他们成为了帝国军队关键的兵源。虽然如此，他们重刀兵而轻文艺的习俗也在帝国内外招致了不少非议。"

ostlander: "奥斯特兰"
ostlander_prefix: "奥斯特兰"
ostlander_collective_noun: "奥斯特兰"
ostlander_desc: "#size:15 东境的领土在帝国中兴期的末尾被纳入帝国统治。对这里的征服导致了大量白河西岸北希里亚移民的涌入，这些定居者随后脱离帝国统治，甚至一度建立起了覆盖全东境的霸权，并在此期间中逐渐与当地人融合。他们的文化很大程度上与其故土的亚贲人相似，但在与东境人的交融中失去了曾经的侵略性和尚武精神。他们生活在尴尬的文化困境中：东境本地的卢齐人视他们为侵略者的后裔与曾经的压迫者，尤其是在帝国近来征讨东方后，更是对其憎恨有加；而帝国一侧，曾经的政治分离也让希里亚人对他们兴趣索然，并不视他们为同胞。"

#南方组
old_banlian: "古班利亚"
old_banlian_prefix: "古班利亚"
old_banlian_collective_noun: "古班利亚"
old_banlian_desc: "#size:15 现如今的帝国南方各民族曾有许多不同的名号。古老王国的遗民称其为亚坎人，所剩无几的旧帝国史料有时将他们统称为南蛮，而现如今的帝国史学界普遍将他们称作古班利亚人。不论称呼如何，这似乎都在暗示现如今将自己视为南希里亚人的各民族在曾经有着更紧密的亲缘关系——乃至曾生活在同一面旗帜下。"

banlian: "班利亚"
banlian_prefix: "班利亚"
banlian_collective_noun: "班利亚"
banlian_desc: "#size:15 主要分布于留西亚地区的班利亚人存在极为特殊；他们与其他南方文化出自同源，却在岁月中发生了许多变化：在受到中央的希里亚人影响的同时，许多南方传统在其文化中的影响仍然根深蒂固。他们保留了南方文化以家族为中心的价值观，又与来自希里亚统治中制度化的“誓言”理念相融合，最终形成了远近闻名的“骑士精神”。在传统豪族基础上构建的骑士阶层是班利亚社会的支柱，并在该地区与帝国官僚政治形成了微妙的结合。他们也以精致的日常生活闻名，他们的饮食与起居风俗被视作一种上流生活的标杆。"

platian: "普拉提亚"
platian_prefix: "普拉提亚"
platian_collective_noun: "普拉提亚"
platian_desc: "#size:15 普拉提亚人在南方各民族当中保留了最多的古老传统。他们的许多节庆与仪式都可以追溯到旧帝国，乃至更古老的时期，其中很多都被质疑具有过多的“宗教性”。也正因为此，他们自从被并入帝国后就与他们口中的“帝国人”嫌隙不断。时至今日，南方文化早已和帝国统治高度融合，但仍不乏有人将普拉提亚人视作不服管教的逆民，而他们所定居的埃匹内省也是地方主义与帝国官僚政治矛盾最激烈的地区之一。"

gollois: "夏瓦利耶"
gollois_prefix: "夏瓦利耶"
gollois_collective_noun: "夏瓦利耶"
gollois_desc: "#size:15 与许多人印象中不同，南希里亚人并非全都安于在自己的故土上居住，而不愿向外开拓。从3世纪开始，陆续有来自留西亚和普拉提亚两省的移民前往富饶的夏瓦勒斯河谷定居；这些移民与当地的高勒汶居民逐渐融合，形成了如今的夏瓦利耶人。他们以高超的骑术闻名，也吸收了一部分高勒汶人的习俗与传统。据传有些高勒汶人将夏瓦勒斯的定居视作一种帝国打压其文化的体现。"

suditish: "苏蒂特"
suditish_prefix: "苏蒂特"
suditish_collective_noun: "苏蒂特"
suditish_desc: "#size:15 苏蒂特人是广泛分布于南省与德约瓦两个省份的南方民族，也是农耕社会边境顽强生存的群体。他们在旧帝国时期与希里亚统治中期遭受过许多灾难与战乱的冲击，而这略显悲惨的命运也塑造了他们独特的民族文化。苏蒂特人往往寡言少语，但他们会通过行动表达顺服与忠诚。他们可以成为完美的下属，劳力与士兵，但与此同时，这种沉默的顺从也偶尔会被外人视作笨拙，乃至愚钝。"

cotier: "科蒂"
cotier_prefix: "科蒂"
cotier_collective_noun: "科蒂"
cotier_desc: "#size:15 科蒂人是南希里亚民族最靠南的一支。他们在亲缘上与普拉提亚人最为接近，也在与多里亚人接触的过程中受到了潜移默化的影响。他们定居在北阿马利亚较为贫瘠的土地上，其习俗虽不如北部同族那般奢侈，但仍继承了南方文化一以贯之的精致。他们不仅擅长农耕和养殖，在造船业上也独有建树——这被认为是来自多里亚的文化影响所致。值得一提的是，科蒂人的饮食文化也在帝国中闻名，其菜系被视作南方饮食的一大代表，地位与班利亚料理平齐。"

#海尼亚组
frindi: "弗林地"
frindi_prefix: "弗林地"
frindi_collective_noun: "弗林地"
frindi: "#size:15 如今帝国的因特马克省及周围地区曾被称作“河间地”，是弗林地人的家园。从语言上来说，他们很可能与高勒汶人有某种亲缘关系，但他们的习俗与高勒汶人大不相同，更多地体现出他们在古木林地区所养成的生存技巧。在过去几百年间，大部分弗林地人都在希里亚文化影响下遭到同化，而少数负隅顽抗者则屈服于帝国的军事征服。现如今，弗林地人作为文化少数零散地分布在因特马克省欠发达的地区，通过古老契约的庇护在帝国官僚主义的夹缝中求存。"

gollowynian: "高勒汶"
gollowynian_prefix: "高勒汶"
gollowynian_collective_noun: "高勒汶"
gollowynian_desc: "#size:15 高勒汶人居住在蒙雾的群山之间，是历史可以追溯到旧帝国之前的古老民族之一。他们与希里亚的关系最早可以追溯到反抗旧帝国暴政之战，并在此之后一直与帝国政权保持着紧密的联系。他们一直是帝国中最忠诚的外族，作为交换，他们的领地也获得了相当大的自治权，令其许多文化习俗得以保全。他们以独特的诗歌和音乐而闻名，许多作品在当今已经难以被外族人解读，但据说其中蕴涵了上百，乃至上千年的历史。"

rupnic: "卢普尼"
rupnic_prefix: "卢普尼"
rupnic_collective_noun: "卢普尼"
rupnic_desc: "#size:15 卢普尼人是曾经分布在达维西亚地区的远古民族，有关他们的记载早已流失，只有模糊的名称残留在少数历史文献的注脚中。"

#多里亚组
ancient_dorian: "古多里亚"
ancient_dorian_prefix: "古多里亚"
ancient_dorian_collective_noun: "古多里亚"
ancient_dorian_desc: ""

