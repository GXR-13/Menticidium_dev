varaparian: "瓦拉帕里亚"
varaparian_prefix: "瓦拉帕里亚"
varaparian_collective_noun: "瓦拉帕里亚"
varaparian_desc: "瓦拉帕里亚人生活在荒凉的达维西亚地区，并将其视作自己的故地。他们的村社有着相当的平等主义色彩，并维系着一种在外人看来匪夷所思的集体制度。除此之外，他们还以极端的和平主义为特征：许多瓦拉帕里亚人从未见过兵器，而士兵往往在其社会中遭到隐性的排斥。在本地信仰的影响下，他们能形成具有相当凝聚力的部落——但若非是因为达维西亚历来鲜少受到周围政权的重视，他们恐怕难逃被征服的命运。"

